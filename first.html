<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Call & WhatsApp Buttons</title>
  <style>
    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
    }
    .call-btn {
      background-color: green;
      color: white;
    }
    .wa-btn {
      background-color: #25D366;
      color: white;
    }
  </style>
</head>
<body>

  <!-- Call Button -->
  <a href="tel:+918507444693">
  <button>📞 Call Now</button>
</a>
  <!-- WhatsApp Button -->
  <a href="https://wa.me/6371781033" target="_blank">
    <button class="wa-btn">💬 Chat on WhatsApp</button>
  </a>

</body>
</html>
